<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Активности" />
  <meta name="theme-color" content="#1A1340" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
:root {
  --bg: #1a1340;
  --card: #352a70;
  --elev: #2c225f;
  --text: #f5f3ff;
  --muted: #b8b0d9;
  --teal: #2dd4bf;
  --orange: #ff8a3d;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100%;
}
body { padding-top: var(--safe-top); padding-bottom: calc(72px + var(--safe-bottom)); }
h1,h2,h3 { margin: 0 0 8px; }
button, input, select, textarea {
  font: inherit; color: inherit;
}
.app-header {
  position: sticky; top: 0; z-index: 20;
  background: rgba(26,19,64,.92); backdrop-filter: blur(12px);
  padding: 12px 16px 8px;
  border-bottom: 1px solid #3a3068;
}
.app-header h1 { font-size: 1.35rem; }
.app-header .sub { color: var(--muted); font-size: .85rem; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search {
  flex: 1; min-width: 140px;
  background: var(--elev); border: none; border-radius: 14px;
  padding: 14px 16px; font-size: 16px; /* iOS zoom fix */
}
.chip-scroll {
  display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px;
  -webkit-overflow-scrolling: touch;
}
.chip {
  flex: 0 0 auto;
  background: var(--elev); border: none; border-radius: 16px;
  padding: 10px 14px; color: var(--text); font-size: .85rem;
  white-space: nowrap; cursor: pointer;
}
.chip.on { background: var(--teal); color: #1a1340; font-weight: 600; }
.chip.orange.on { background: var(--orange); color: #1a1340; }
.list { padding: 8px 16px 24px; display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--card); border-radius: 18px; padding: 14px 16px;
  cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.card .badge {
  display: inline-block; background: rgba(45,212,191,.2); color: var(--teal);
  border-radius: 8px; padding: 4px 10px; font-size: .75rem; margin-bottom: 8px;
}
.card h3 { font-size: 1.05rem; }
.card .meta { color: var(--muted); font-size: .85rem; margin-top: 6px; }
.card .goals { color: var(--teal); font-size: .8rem; margin-top: 6px; }
.nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
  display: flex; justify-content: space-around;
  background: #241b54; border-top: 1px solid #3a3068;
  padding: 8px 4px calc(8px + var(--safe-bottom));
}
.nav button {
  flex: 1; background: none; border: none; color: var(--muted);
  padding: 8px 4px; font-size: .7rem; display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.nav button.on { color: var(--teal); }
.nav .ico { font-size: 1.25rem; }
.screen { display: none; min-height: 60vh; }
.screen.on { display: block; }
.detail { padding: 16px; }
.detail .big-btn {
  width: 100%; background: var(--teal); color: #1a1340; border: none;
  border-radius: 16px; padding: 16px; font-weight: 700; font-size: 1.05rem;
  margin: 12px 0; cursor: pointer;
}
.detail .sec { margin: 16px 0 6px; color: var(--teal); font-weight: 600; }
.detail p, .detail pre {
  white-space: pre-wrap; line-height: 1.45; color: var(--text); margin: 0 0 8px;
  font-family: inherit;
}
.back {
  background: none; border: none; color: var(--teal); font-size: 1rem;
  padding: 8px 0; cursor: pointer;
}
.counselor {
  position: fixed; inset: 0; z-index: 50; background: #0d0a1f;
  padding: calc(12px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
  overflow: auto; display: none;
}
.counselor.on { display: flex; flex-direction: column; }
.counselor .timer {
  font-size: 2.5rem; font-weight: 800; color: var(--teal); text-align: center;
}
.counselor .step-text {
  flex: 1; background: #352a70; border-radius: 16px; padding: 20px;
  font-size: 1.25rem; line-height: 1.45; margin: 12px 0;
}
.counselor .reflect {
  background: #3d2a12; color: #ffe0b2; border-radius: 16px; padding: 16px;
  font-size: 1.15rem; line-height: 1.4;
}
.btn-row { display: flex; gap: 8px; }
.btn-row button {
  flex: 1; border: none; border-radius: 14px; padding: 14px; font-weight: 700; cursor: pointer;
}
.btn-teal { background: var(--teal); color: #1a1340; }
.btn-orange { background: var(--orange); color: #1a1340; }
.btn-ghost { background: #352a70; color: var(--text); }
.form { padding: 16px; }
.form label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: .9rem; }
.form input[type=range] { width: 100%; }
.form .val { color: var(--teal); font-weight: 600; }
.tip {
  background: var(--elev); border-radius: 12px; padding: 12px; margin: 12px 16px;
  color: var(--muted); font-size: .9rem; line-height: 1.4;
}
.day-block {
  margin: 12px 16px; background: var(--card); border-radius: 16px; padding: 14px;
}
.day-block h3 { color: var(--teal); }
.slot {
  background: var(--elev); border-radius: 12px; padding: 10px 12px; margin-top: 8px;
  cursor: pointer;
}
.slot .role { color: var(--orange); font-size: .8rem; }
.empty { text-align: center; color: var(--muted); padding: 48px 24px; }
.install-banner {
  margin: 8px 16px; background: #2c225f; border: 1px solid var(--teal);
  border-radius: 14px; padding: 12px; font-size: .9rem; line-height: 1.4;
}
.fav { float: right; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
.hidden { display: none !important; }

</style>
  <title>Активности</title>
</head>
<body>
  <div id="installBanner" class="install-banner hidden">
    <strong>Установка на iPhone без App Store</strong><br/>
    Safari → кнопка «Поделиться» → <b>«На экран „Домой“»</b>. Приложение откроется как отдельное и работает offline.
  </div>

  <!-- HOME -->
  <section id="screen-home" class="screen on">
    <header class="app-header">
      <h1>Активности</h1>
      <div class="sub">iPhone · offline · 100 игр</div>
      <div class="row" style="margin-top:10px">
        <input id="search" class="search" type="search" placeholder="Найти за 10 секунд…" enterkeyhint="search" />
      </div>
    </header>
    <div class="chip-scroll" id="presetChips"></div>
    <div class="chip-scroll" id="catChips"></div>
    <div class="list" id="homeList"></div>
  </section>

  <!-- DETAIL -->
  <section id="screen-detail" class="screen">
    <div class="detail">
      <button class="back" id="detailBack">← Назад</button>
      <div id="detailBody"></div>
    </div>
  </section>

  <!-- PLAN -->
  <section id="screen-plan" class="screen">
    <header class="app-header">
      <h1>Подборка на смену</h1>
      <div class="sub">Авто-сетка с логикой дней и мест</div>
    </header>
    <div class="form">
      <label>Название</label>
      <input id="planTitle" class="search" value="Смена · сплочение" />
      <label>Дней: <span class="val" id="daysVal">10</span></label>
      <input id="planDays" type="range" min="3" max="21" value="10" />
      <label>Игр в день: <span class="val" id="perDayVal">3</span></label>
      <input id="planPerDay" type="range" min="2" max="5" value="3" />
      <label>Типы (можно несколько)</label>
      <div class="chip-scroll" id="planCats" style="padding-left:0"></div>
      <button class="detail big-btn" id="genPlan">Сгенерировать</button>
    </div>
    <div id="planResult"></div>
  </section>

  <!-- FAV -->
  <section id="screen-fav" class="screen">
    <header class="app-header"><h1>Избранное</h1></header>
    <div class="list" id="favList"></div>
  </section>

  <!-- HISTORY -->
  <section id="screen-hist" class="screen">
    <header class="app-header"><h1>История</h1></header>
    <div class="list" id="histList"></div>
  </section>

  <!-- COUNSELOR OVERLAY -->
  <div id="counselor" class="counselor">
    <div class="row" style="justify-content:space-between">
      <button class="btn-ghost" id="cExit" style="padding:10px 14px;border-radius:12px">✕</button>
      <div class="timer" id="cTimer">00:00</div>
      <button class="btn-teal" id="cTimerBtn" style="padding:10px 14px;border-radius:12px">▶</button>
    </div>
    <div id="cPhase" style="color:var(--teal);font-size:.85rem;margin-top:8px"></div>
    <h2 id="cTitle" style="margin-top:8px"></h2>
    <div id="cBody" class="step-text"></div>
    <div class="btn-row">
      <button class="btn-ghost" id="cPrev">Назад</button>
      <button class="btn-teal" id="cNext">Далее</button>
    </div>
  </div>

  <nav class="nav">
    <button class="on" data-tab="home"><span class="ico">🏠</span>Каталог</button>
    <button data-tab="plan"><span class="ico">📅</span>Смена</button>
    <button data-tab="fav"><span class="ico">★</span>Избранное</button>
    <button data-tab="hist"><span class="ico">🕑</span>История</button>
  </nav>

  <script>
/* Активности — iOS PWA (offline, без App Store) */
(function () {
  'use strict';

  const CAT_LABEL = {
    PHYSICAL: '🏃 Физические',
    VERBAL: '💬 Вербальные',
    CREATIVE: '🎨 Творческие',
    CHALLENGE: '🧩 Челленджи'
  };
  const GOAL_RU = {
    BONDING: 'Сплочение', EMPATHY: 'Эмпатия', LISTENING: 'Слушание',
    ENERGY_RELEASE: 'Сброс энергии', CALM_DOWN: 'Заземление', INCLUSION: 'Включить тихого',
    LEADERSHIP: 'Лидерство', AFTER_CONFLICT: 'После напряжения', ICEBREAK: 'Знакомство', FOCUS: 'Фокус'
  };
  const PRESETS = [
    { id: 'canteen', title: '🍽️ Столовая', filter: (a) => a.durationMin <= 12 && a.propsLevel !== 'COMPLEX' },
    { id: 'rain', title: '🌧️ Дождь', filter: (a) => a.places.some((p) => p === 'HALL' || p === 'SMALL_ROOM') && a.energy !== 'HIGH' },
    { id: 'outdoor', title: '☀️ Улица', filter: (a) => a.places.includes('OUTDOOR') },
    { id: 'bus', title: '🚌 Автобус', filter: (a) => a.places.includes('BUS') },
    { id: 'evening', title: '🌙 Вечер', filter: (a) => a.energy === 'CALM' && (a.category === 'VERBAL' || a.category === 'CREATIVE') },
    { id: 'day1', title: '👋 День 1', filter: (a) => (a.goals || []).includes('ICEBREAK') || a.durationMin <= 14 }
  ];

  let ALL = [];
  let state = {
    tab: 'home',
    query: '',
    cat: null,
    preset: null,
    detail: null,
    fav: loadSet('fav'),
    hist: loadJson('hist', []),
    plans: loadJson('plans', [])
  };

  function loadSet(k) {
    try { return new Set(JSON.parse(localStorage.getItem(k) || '[]')); } catch { return new Set(); }
  }
  function saveSet(k, s) { localStorage.setItem(k, JSON.stringify([...s])); }
  function loadJson(k, d) {
    try { return JSON.parse(localStorage.getItem(k) || JSON.stringify(d)); } catch { return d; }
  }
  function saveJson(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  async function init() {
    ALL = [{"number": 1, "title": "Гелиевая палочка", "category": "PHYSICAL", "durationMin": 12, "propsText": "Палка / обруч 1–1,5 м", "rules": "1) Встаньте в два ряда, пальцы вперёд.\n2) Палочка на указательные пальцы.\n3) Опустите её на пол, не теряя контакта.\n4) 2–3 попытки со стратегической паузой.", "psychology": "Синхронизация и общая ответственность; «переусердие» мешает результату.", "reflection": "Что помогло договориться с палочкой — слова, пауза или чужой темп?", "energy": "MEDIUM", "places": ["HALL", "OUTDOOR"], "propsLevel": "MINIMAL", "goals": ["FOCUS", "BONDING", "LISTENING"], "isQuickRescue": true, "id": 1}, {"number": 2, "title": "Слепой маршрут назад", "category": "PHYSICAL", "durationMin": 18, "propsText": "Ориентиры, повязки (опц.)", "rules": "1) Пара: пилот спиной вперёд с закрытыми глазами + навигатор голосом.\n2) Маршрут 8–12 м.\n3) Не задеть ориентиры.\n4) Смена ролей.", "psychology": "Точная спокойная инструкция и безопасное доверие.", "reflection": "Какие слова навигатора реально помогали?", "energy": "MEDIUM", "places": ["OUTDOOR"], "propsLevel": "MINIMAL", "goals": ["LISTENING", "BONDING", "FOCUS"], "isQuickRescue": false, "id": 2}, {"number": 3, "title": "Человеческий узел 2.0", "category": "PHYSICAL", "durationMin": 15, "propsText": "Не нужен", "rules": "1) Круг 8–12 человек, руки к центру — две чужие руки.\n2) Распутаться, не разжимая.\n3) Опция: 1–2 с закрытыми глазами.", "psychology": "Терпение, переговоры в тесном контакте, решение хаоса.", "reflection": "Кто стал «голосом спокойствия» в узле?", "energy": "MEDIUM", "places": ["HALL", "OUTDOOR"], "propsLevel": "ZERO", "goals": ["BONDING", "FOCUS", "LEADERSHIP"], "isQuickRescue": true, "id": 3}, {"number": 4, "title": "Ветры ивы", "category": "PHYSICAL", "durationMin": 14, "propsText": "Мягкий пол желателен", "rules": "1) Плотный круг 8–10 человек.\n2) Доброволец в центре мягко отклоняется.\n3) Круг ловит и возвращает.\n4) Малая амплитуда, отказ — норма.", "psychology": "Телесный опы         state.tab = b.dataset.tab;

        showTab(state.tab);
        render();

    document.getElementById('cExit').onclick = closeCounselor;
    document.getElementById('cNext').onclick = () => counselorNav(1);
    document.getElementById('cPrev').onclick = () => counselorNav(-1);
    document.getElementById('cTimerBtn').onclick = toggleTimer;
  }

  function showTab(tab) {
    document.querySelectorAll('.screen').forEach((s) => s.classList.remove('on'));
    const map = { home: 'screen-home', plan: 'screen-plan', fav: 'screen-fav', hist: 'screen-hist', detail: 'screen-detail' };
    const id = map[tab] || 'screen-home';
    document.getElementById(id).classList.add('on');
  }

  function filtered() {
    return ALL.filter((a) => {
      if (state.cat && a.category !== state.cat) return false;
      if (state.preset) {
        const p = PRESETS.find((x) => x.id === state.preset);
        if (p && !p.filter(a)) return false;
      }
      if (state.query) {
        const blob = (a.title + ' ' + a.rules + ' ' + (a.goals || []).join(' ')).toLowerCase();
        if (!blob.includes(state.query) && String(a.number) !== state.query) return false;
      }
      return true;
    });
  }

  function render() {
    if (state.detail) {
      showTab('detail');
      renderDetail();
      return;
    }
    showTab(state.tab);
    if (state.tab === 'home') renderHome();
    if (state.tab === 'fav') renderFav();
    if (state.tab === 'hist') renderHist();
    if (state.tab === 'plan') renderPlanForm();
  }

  function renderHome() {
    const presets = document.getElementById('presetChips');
    presets.innerHTML = PRESETS.map((p) =>
      `<button class="chip orange ${state.preset === p.id ? 'on' : ''}" data-p="${p.id}">${p.title}</button>`
    ).join('');
    presets.querySelectorAll('button').forEach((b) => {
      b.onclick = () => {
        state.preset = state.preset === b.dataset.p ? null : b.dataset.p;
        renderHome();
      };
    });

    const cats = document.getElementById('catChips');
    const catKeys = ['PHYSICAL', 'VERBAL', 'CREATIVE', 'CHALLENGE'];
    cats.innerHTML = `<button class="chip ${!state.cat ? 'on' : ''}" data-c="">Все</button>` +
      catKeys.map((c) =>
        `<button class="chip ${state.cat === c ? 'on' : ''}" data-c="${c}">${CAT_LABEL[c]}</button>`
      ).join('');
    cats.querySelectorAll('button').forEach((b) => {
      b.onclick = () => {
        state.cat = b.dataset.c || null;
        renderHome();
      };
    });

    const list = filtered();
    document.getElementById('homeList').innerHTML =
      `<div class="tip">Найдено: ${list.length}. Потряси телефон (на Android) или выбери пресет.</div>` +
      list.map(cardHtml).join('');
    bindCards();
  }

  function cardHtml(a) {
    const fav = state.fav.has(a.number) ? '★' : '☆';
    const goals = (a.goals || []).slice(0, 2).map((g) => GOAL_RU[g] || g).join(' · ');
    return `<article class="card" data-n="${a.number}">
      <button class="fav" data-fav="${a.number}">${fav}</button>
      <div class="badge">${CAT_LABEL[a.category] || a.category}</div>
      <h3>${a.number}. ${esc(a.title)}</h3>
      <div class="meta">≈ ${a.durationMin} мин · ${a.energy} · ${a.propsLevel}</div>
      ${goals ? `<div class="goals">Цель: ${esc(goals)}</div>` : ''}
    </article>`;
  }

  function bindCards() {
    document.querySelectorAll('.card[data-n]').forEach((el) => {
      el.onclick = (e) => {
        if (e.target.closest('[data-fav]')) return;
        openDetail(+el.dataset.n);
      };
    });
    document.querySelectorAll('[data-fav]').forEach((b) => {
      b.onclick = (e) => {
        e.stopPropagation();
        const n = +b.dataset.fav;
        if (state.fav.has(n)) state.fav.delete(n); else state.fav.add(n);
        saveSet('fav', state.fav);
        render();
      };
    });
  }

  function openDetail(n) {
    state.detail = ALL.find((a) => a.number === n);
    render();
  }

  function renderDetail() {
    const a = state.detail;
    if (!a) return;
    const goals = (a.goals || []).map((g) => GOAL_RU[g] || g).join(' · ');
    const steps = leaderSteps(a);
    document.getElementById('detailBody').innerHTML = `
      <div class="badge">${CAT_LABEL[a.category]}</div>
      <h2>${a.number}. ${esc(a.title)}</h2>
      <p class="meta">≈ ${a.durationMin} мин · ${a.energy} · ${esc(a.props.join(', '))}</p>
      ${goals ? `<p style="color:var(--teal)"><b>Цели:</b> ${esc(goals)}</p>` : ''}
      <button class="big-btn" id="startCounselor">▶ Режим ведущего</button>
      <div class="sec">Реквизит</div><pre>${esc(a.propsText)}</pre>
      <div class="sec">Правила</div><pre>${esc(a.rules)}</pre>
      <div class="sec">Смысл</div><pre>${esc(a.psychology)}</pre>
      <div class="sec">Рефлексия</div><pre>${esc(a.reflection)}</pre>
      <div class="sec">Шагов в режиме ведущего: ${steps.length}</div>
    `;
    document.getElementById('startCounselor').onclick = () => openCounselor(a);
  }

  function renderFav() {
    const list = ALL.filter((a) => state.fav.has(a.number));
    document.getElementById('favList').innerHTML = list.length
      ? list.map(cardHtml).join('')
      : '<div class="empty">Пока пусто — жмите ☆ на карточках</div>';
    bindCards();
  }

  function renderHist() {
    const h = state.hist;
    document.getElementById('histList').innerHTML = h.length
      ? h.map((x) => `<div class="card" data-n="${x.number}">
          <h3>${x.emoji || '✓'} ${x.number}. ${esc(x.title)}</h3>
          <div class="meta">${x.rating} · ${new Date(x.at).toLocaleString('ru')}</div>
        </div>`).join('')
      : '<div class="empty">Завершите игру в режиме ведущего</div>';
    bindCards();
  }

  function renderPlanForm() {
    const wrap = document.getElementById('planCats');
    if (!wrap.dataset.ready) {
      wrap.innerHTML = Object.keys(CAT_LABEL).map((c) =>
        `<button type="button" class="chip on" data-pc="${c}">${CAT_LABEL[c]}</button>`
      ).join('');
      wrap.querySelectorAll('button').forEach((b) => {
        b.onclick = () => b.classList.toggle('on');
      });
      wrap.dataset.ready = '1';
    }
    // show saved last plan
    if (state.plans[0] && !document.getElementById('planResult').dataset.live) {
      document.getElementById('planResult').innerHTML = renderPlanHtml(state.plans[0]);
      bindPlanSlots();
    }
  }

  /* ─── Multi-day generator (place-aware) ─── */
  function venueMode(a) {
    const outdoor = a.places.includes('OUTDOOR');
    const indoor = a.places.includes('HALL') || a.places.includes('SMALL_ROOM');
    const bus = a.places.includes('BUS');
    if (bus && !outdoor && !indoor) return 'BUS';
    if (outdoor && !indoor) return 'OUTDOOR';
    if (indoor && !outdoor) return 'INDOOR';
    if (a.category === 'CREATIVE') return 'INDOOR';
    if (a.category === 'PHYSICAL' && a.energy === 'HIGH' && outdoor) return 'OUTDOOR';
    if (a.category === 'PHYSICAL' && outdoor) return 'OUTDOOR';
    if (indoor) return 'INDOOR';
    if (outdoor) return 'OUTDOOR';
    return 'INDOOR';
  }
  function fitsVenue(mode, a) {
    if (mode === 'OUTDOOR') return a.places.includes('OUTDOOR');
    if (mode === 'INDOOR') return a.places.includes('HALL') || a.places.includes('SMALL_ROOM');
    if (mode === 'BUS') return a.places.includes('BUS');
    return true;
  }

  function generatePlan() {
    const days = +document.getElementById('planDays').value;
    const perDay = +document.getElementById('planPerDay').value;
    const title = document.getElementById('planTitle').value || `Смена · ${days} дн.`;
    const cats = [...document.querySelectorAll('#planCats .chip.on')].map((b) => b.dataset.pc);
    let pool = ALL.filter((a) => cats.includes(a.category));
    if (pool.length < days * perDay) pool = ALL.slice();
    pool = shuffle(pool);

    const used = new Set();
    const planDays = [];
    for (let d = 1; d <= days; d++) {
      const phase = d <= 2 ? 'Оргпериод / знакомство' : d / days >= 0.75 ? 'Финал / смысл' : 'Основная часть';
      const roles = perDay === 2 ? ['Разогрев', 'Заземление']
        : perDay === 3 ? ['Разогрев', 'Ядро', 'Заземление']
        : ['Разогрев', 'Ядро', 'Ядро', 'Заземление'].slice(0, perDay);
      let venue = null;
      const slots = [];
      let lastCat = null;
      for (let i = 0; i < roles.length; i++) {
        const role = roles[i];
        let cands = pool.filter((a) => !used.has(a.number));
        if (venue) {
          const fit = cands.filter((a) => fitsVenue(venue, a));
          if (fit.length) cands = fit;
        }
        // score
        cands = cands.map((a) => {
          let s = Math.random();
          if (d <= 2 && (a.goals || []).includes('ICEBREAK')) s += 5;
          if (phase.startsWith('Финал') && ((a.goals || []).includes('CALM_DOWN') || a.number === 100)) s += 5;
          if (role === 'Разогрев' && a.durationMin <= 14) s += 3;
          if (role === 'Заземление' && a.energy === 'CALM') s += 4;
          if (role === 'Ядро' && (a.category === 'CHALLENGE' || a.category === 'CREATIVE')) s += 2;
          if (lastCat && a.category === lastCat) s -= 8;
          if (venue && fitsVenue(venue, a)) s += 10;
          if (venue && !fitsVenue(venue, a)) s -= 30;
          return { a, s };
        }).sort((x, y) => y.s - x.s);
        const pick = cands[0]?.a;
        if (!pick) break;
        used.add(pick.number);
        if (!venue) venue = venueMode(pick);
        lastCat = pick.category;
        slots.push({
          role,
          number: pick.number,
          title: pick.title,
          category: pick.category,
          durationMin: pick.durationMin,
          reason: `День ${d} · ${role} · место: ${venueLabel(venue)}`
        });
      }
      planDays.push({
        day: d,
        phase,
        venue: venueLabel(venue),
        tip: venueTip(phase, venue),
        slots,
        minutes: slots.reduce((s, x) => s + x.durationMin, 0)
      });
    }
    const plan = { title, days, perDay, daysData: planDays, at: Date.now() };
    state.plans = [plan, ...state.plans].slice(0, 10);
    saveJson('plans', state.plans);
    const box = document.getElementById('planResult');
    box.dataset.live = '1';
    box.innerHTML = renderPlanHtml(plan);
    bindPlanSlots();
  }

  function venueLabel(v) {
    return ({ OUTDOOR: 'улица', INDOOR: 'корпус/комната', BUS: 'автобус' })[v] || '—';
  }
  function venueTip(phase, venue) {
    return `${phase}. Место дня: ${venueLabel(venue)} — активности согласованы, без «рисование → беготня на улице».`;
  }

  function renderPlanHtml(plan) {
    return `<div class="tip"><b>${esc(plan.title)}</b> · ${plan.days} дн. · ${plan.perDay} игр/день</div>` +
      plan.daysData.map((d) => `
        <div class="day-block">
          <h3>День ${d.day} · ${esc(d.phase)}</h3>
          <div class="meta">${esc(d.tip)} · ≈ ${d.minutes} мин</div>
          ${d.slots.map((s) => `
            <div class="slot" data-n="${s.number}">
              <div class="role">${esc(s.role)}</div>
              <b>${s.number}. ${esc(s.title)}</b>
              <div class="meta">${s.durationMin} мин · ${CAT_LABEL[s.category] || ''} · ${esc(s.reason)}</div>
            </div>`).join('')}
        </div>`).join('');
  }
  function bindPlanSlots() {
    document.querySelectorAll('.slot[data-n]').forEach((el) => {
      el.onclick = () => openDetail(+el.dataset.n);
    });
  }

  /* ─── Counselor mode ─── */
  let cState = null;
  let timerId = null;
  let timerSec = 0;
  let timerRun = false;

  function leaderSteps(a) {
    const lines = String(a.rules || '').split('\n').map((x) => x.trim()).filter(Boolean);
    const steps = [
      `Скажи: «Сейчас попробуем «${a.title}». Можно сказать „пас“ — это ок.»`,
      'Покажи / объясни правила (1–2 мин).'
    ];
    lines.forEach((l, i) => steps.push(`Шаг ${i + 1}: ${l.replace(/^\d+[).]\s*/, '')}`));
    steps.push('Стоп-сигнал. Поблагодари группу без «кто лучше».');
    steps.push('Рефлексия: Что происходило?');
    steps.push(a.reflection || 'Что почувствовали?');
    steps.push('Что возьмём в жизнь отряда завтра?');
    steps.push('RATE');
    return steps;
  }

  function openCounselor(a) {
    cState = { a, steps: leaderSteps(a), i: 0 };
    timerSec = 0; timerRun = false;
    document.getElementById('counselor').classList.add('on');
    document.getElementById('cTitle').textContent = a.title;
    renderCounselor();
  }
  function closeCounselor() {
    document.getElementById('counselor').classList.remove('on');
    stopTimer();
    cState = null;
  }
  function renderCounselor() {
    if (!cState) return;
    const { steps, i, a } = cState;
    const step = steps[i];
    document.getElementById('cPhase').textContent = `Шаг ${i + 1} / ${steps.length}`;
    const body = document.getElementById('cBody');
    if (step === 'RATE') {
      body.className = 'step-text';
      body.innerHTML = `<p>Как прошло?</p>
        <button class="big-btn" data-r="GOOD">🔥 Зашло</button>
        <button class="big-btn" data-r="OK" style="background:var(--orange)">😐 Средне</button>
        <button class="big-btn" data-r="MISS" style="background:#555">👎 Мимо</button>`;
      body.querySelectorAll('[data-r]').forEach((b) => {
        b.onclick = () => {
          const emoji = { GOOD: '🔥', OK: '😐', MISS: '👎' }[b.dataset.r];
          state.hist.unshift({
            number: a.number, title: a.title, rating: b.dataset.r, emoji, at: Date.now()
          });
          state.hist = state.hist.slice(0, 100);
          saveJson('hist', state.hist);
          closeCounselor();
          render();
        };
      });
    } else if (i >= steps.length - 4 && i < steps.length - 1) {
      body.className = 'reflect';
      body.textContent = step;
    } else {
      body.className = 'step-text';
      body.textContent = step;
    }
    document.getElementById('cPrev').disabled = i === 0;
  }
  function counselorNav(d) {
    if (!cState) return;
    cState.i = Math.max(0, Math.min(cState.steps.length - 1, cState.i + d));
    renderCounselor();
  }
  function toggleTimer() {
    if (timerRun) stopTimer();
    else {
      timerRun = true;
      document.getElementById('cTimerBtn').textContent = '⏸';
      timerId = setInterval(() => {
        timerSec++;
        const mm = String(Math.floor(timerSec / 60)).padStart(2, '0');
        const ss = String(timerSec % 60).padStart(2, '0');
        document.getElementById('cTimer').textContent = `${mm}:${ss}`;
      }, 1000);
    }
  }
  function stopTimer() {
    timerRun = false;
    clearInterval(timerId);
    const btn = document.getElementById('cTimerBtn');
    if (btn) btn.textContent = '▶';
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  init().catch((e) => {
    document.body.innerHTML = `<div class="empty">Ошибка загрузки: ${esc(e.message)}</div>`;
  });
})();

</script>
</body>
</html>
